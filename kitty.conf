# Generated from iTerm2 profile "Default" on 2026-04-30.
# Shell, aliases, starship, and vim are inherited from your existing dotfiles.

# BEGIN_KITTY_THEME
# Tokyo Night
# include tokyo_night.conf
include catppuccin-mocha-iterm.conf
# END_KITTY_THEME

# Font and window geometry
font_family Monaco
bold_font auto
italic_font auto
bold_italic_font auto
# symbol_map U+E0B4,U+E0B6 Symbols Nerd Font Mono
# somehow font_size 15 causes "tofu" tokens blinking after existing tmux or kitten themes...
font_size 14
# modify_font cell_height -1px
text_composition_strategy legacy
initial_window_width 80c
initial_window_height 25c
remember_window_size no
window_padding_width 0
window_border_width 0.5pt
draw_minimal_borders yes
draw_window_borders_for_single_window no
background_opacity 1.0
dynamic_background_opacity no
tab_bar_edge top
tab_bar_style custom
tab_separator ""
tab_bar_margin_height 0 0
tab_bar_margin_width 0
tab_title_max_length 20
tab_title_template slant #"{custom}"
active_tab_title_template none

# Terminal behavior
shell /bin/zsh -l
scrollback_lines 1000
enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no
macos_dock_badge_on_bell no
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
copy_on_select yes
strip_trailing_spaces smart
confirm_os_window_close 0
allow_remote_control yes
shell_integration no-cursor no-title
detect_urls no
url_style straight
underline_hyperlinks never

# macOS behavior similar to iTerm2's Option-key navigation.
macos_option_as_alt yes
macos_titlebar_color background
macos_show_window_title_in none
macos_quit_when_last_window_closed yes
macos_hide_from_tasks no
macos_thicken_font 0

# Clipboard and window/tab actions
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+n new_os_window
map cmd+t new_tab
map cmd+w close_tab
map cmd+shift+w close_window
map cmd+enter toggle_fullscreen
map cmd+shift+r load_config_file
map cmd+k clear_terminal scrollback active
map cmd+l send_text all \x0c

# Tab navigation, matching common iTerm2 defaults.
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+left previous_tab
map cmd+right next_tab
map cmd+shift+[ previous_tab
map cmd+shift+] next_tab

# Font size controls.
map cmd+plus change_font_size all +1.0
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# Word movement and deletion in shells/editors that understand readline-style keys.
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
map alt+backspace send_text all \x1b\x7f
map ctrl+backspace send_text all \x17
map ctrl+delete send_text all \x1bd
map cmd+backspace send_text all \x15

# Open URLs like iTerm2.
mouse_map left click ungrabbed mouse_handle_click selection prompt
mouse_map cmd+left press grabbed,ungrabbed discard_event
mouse_map cmd+left release grabbed,ungrabbed mouse_handle_click link

# Split/window navigation for Kitty layouts.
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+] next_window
map cmd+[ previous_window



# Keep these after theme includes. `kitten themes` writes
# `macos_titlebar_color system`, which reintroduces the white titlebar.
macos_titlebar_color background
active_tab_foreground #ffa91f
active_tab_background #4a4a4a
inactive_tab_foreground #adaaaa
inactive_tab_background #4a4a4a
tab_bar_background #2f2f2f
active_border_color #f5c2e7
inactive_border_color #585b70
